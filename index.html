<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LookAhead</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Swiper -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-md bg-dark p-3 px-5">
      <div class="container-fluid">
        <!-- Brand / Logo -->
        <a class="navbar-brand" href="#">
          <img
            src="./assets/logo.png"
            alt="Logo"
            width="80"
            height="auto"
            class="d-inline-block align-text-top"
          />
        </a>

        <!-- Hamburger toggler -->
        <button
          class="navbar-toggler border-secondary"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="toggler-bar top"></span>
          <span class="toggler-bar mid"></span>
          <span class="toggler-bar bot"></span>
        </button>
        <!-- nav links -->
        <div class="collapse navbar-collapse" id="mainNav">
          <ul
            class="navbar-nav ms-auto gap-4 py-3 py-md-0 d-flex flex-row justify-content-center"
          >
            <li class="nav-item">
              <a href="#" class="btn btn-outline-light px-4">Тренери</a>
            </li>
            <li class="nav-item">
              <a href="#" class="btn btn-light px-4">Інформація</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="hero">
      <!-- Video background -->
      <video class="hero__video" autoplay muted playsinline>
        <source src="./assets/cubevid.mp4#t=2" type="video/mp4" />
      </video>

      <!-- Dark overlay -->
      <div class="hero__overlay"></div>

      <!-- Layout -->
      <div class="hero__inner">
        <!-- LEFT: Text content -->
        <div class="hero__text">
          <span class="hero__eyebrow">LookAhead</span>
          <h1 class="hero__title">
            Розкрий свій<br />
            <em>потенціал</em>
          </h1>
          <p class="hero__sub">
            Найкращі тренери. Індивідуальний підхід.<br />
            Результат, який говорить сам за себе.
          </p>
          <div class="hero__actions">
            <a href="#" class="hero__btn hero__btn--primary">Почати зараз</a>
            <a href="#" class="hero__btn hero__btn--ghost">Дізнатись більше</a>
          </div>
        </div>
      </div>
    </section>

    <div class="contact-form py-4">
      <h2>Форма зв'язку</h2>
      <form>
        <div class="form-floating mb-2">
          <input
            type="text"
            class="form-control"
            id="floatingInput"
            placeholder="Ваше ім'я"
            required
          />
          <label for="floatingInput">Ваше ім'я</label>
        </div>
        <div class="form-floating mb-2">
          <input
            type="text"
            class="form-control"
            id="floatingNumber"
            placeholder="Telegram або номер телефону"
            required
          />
          <label for="floatingNumber">Telegram або номер телефону</label>
        </div>

        <select
          name="level"
          id="level-select"
          class="form-select mb-2"
          required
        >
          <option selected>--Виберіть ваш час складання--</option>
          <option value="new">Початківець</option>
          <option value="beginner">Менше 2хв</option>
          <option value="cat">Менше 1хв</option>
          <option value="cat">Менше 40секунд</option>
        </select>
        <button class="submit mx-auto" type="submit">Відправити</button>
      </form>
    </div>

    <!-- Team members -->
    <!-- Desktop -->

    <h2>Наша команда</h2>
    <div class="team-grid d-none d-md-grid" id="teamGrid"></div>
    <!-- Mobile -->
    <div class="d-md-none swiper team-swiper">
      <div class="swiper-wrapper" id="teamSwiper"></div>
      <div class="swiper-pagination team-swiper-pagination"></div>
    </div>

    <!-- <a href="https://www.vecteezy.com/free-videos/3d-rendering">3d Rendering Stock Videos by Vecteezy</a> -->
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="./main.js"></script>
</html>
