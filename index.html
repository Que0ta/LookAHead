<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LookAhead</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-md bg-dark px-3">
      <div class="container-fluid">
        <!-- Brand / Logo -->
        <a class="navbar-brand" href="#">
          <img
            src="./logo.png"
            alt="Logo"
            width="80"
            height="auto"
            class="d-inline-block align-text-top"
          />
        </a>

        <!-- Hamburger toggler (visible on mobile) -->
        <button
          class="navbar-toggler border-secondary"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="toggler-bar top"></span>
          <span class="toggler-bar mid"></span>
          <span class="toggler-bar bot"></span>
        </button>
        <!-- Collapsible nav links -->
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto gap-4 py-3 py-md-0 d-flex flex-row justify-content-center">
            <li class="nav-item">
              <a href="#" class="btn btn-outline-light px-4">Тренери</a>
            </li>
            <li class="nav-item">
              <a href="#" class="btn btn-light px-4">Інформація</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
</html>
